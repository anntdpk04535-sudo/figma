<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sản phẩm & Dịch vụ – IronCore Gym</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
  <a href="index.html" class="nav-logo">IRON<span>CORE</span></a>
  <ul class="nav-links">
    <li><a href="products.html" style="color: var(--gold)">Sản phẩm</a></li>
    <li><a href="about.html">Giới thiệu</a></li>
    <li><a href="contact.html">Liên hệ</a></li>
    <li><a href="cart.html">🛒 Giỏ hàng</a></li>
  </ul>
  <div id="nav-user"></div>
</nav>

<!-- PRODUCT HERO -->
<section style="background: var(--dark2); padding-top: 120px; padding-bottom: 40px; text-align: center;">
  <div class="section-header" style="margin-bottom: 0;">
    <div class="section-label" style="justify-content: center;">Cửa hàng</div>
    <h1 class="section-title">Danh Sách Sản Phẩm</h1>
    <p class="section-sub" style="margin: 0 auto; margin-top: 0.5rem;">Khám phá các gói tập đẳng cấp cùng phụ kiện, thực phẩm bổ sung chính hãng.</p>
  </div>
</section>

<!-- MAIN SHOP SECTION -->
<section style="background: var(--black); display: grid; grid-template-columns: 250px 1fr; gap: 2rem; align-items: start;">
  
  <!-- Sidebar Bộ Lọc -->
  <aside style="background: var(--dark); padding: 1.5rem; border-radius: var(--radius); border: 1px solid var(--dark3);">
    <h3 style="font-family: var(--font-h); font-size: 20px; color: var(--gold); margin-bottom: 1rem; text-transform: uppercase;">Tìm kiếm</h3>
    <div class="search-wrap" style="margin-bottom: 1.5rem;">
      <input type="text" id="shop-search" placeholder="Từ khóa..." style="max-width: 100%; height: 38px;"/>
    </div>

    <h3 style="font-family: var(--font-h); font-size: 20px; color: var(--gold); margin-bottom: 1rem; text-transform: uppercase;">Danh mục</h3>
    <div id="shop-categories" style="display: flex; flex-direction: column; gap: 0.5rem;">
      <!-- Danh mục -->
    </div>

    <h3 style="font-family: var(--font-h); font-size: 20px; color: var(--gold); margin-top: 1.5rem; margin-bottom: 1rem; text-transform: uppercase;">Sắp xếp theo giá</h3>
    <select id="shop-sort" style="width: 100%; padding: 8px; background: var(--dark2); border: 1px solid var(--dark3); color: var(--white); border-radius: var(--radius); outline: none;">
      <option value="default">Mặc định</option>
      <option value="asc">Giá thấp đến cao</option>
      <option value="desc">Giá cao đến thấp</option>
    </select>
  </aside>

  <!-- Danh sách lưới sản phẩm -->
  <div>
    <div class="product-grid" id="shop-grid"></div>
  </div>
</section>

<!-- FOOTER -->
<footer class="footer">
  <div class="footer-bottom">
    <span>© 2025 <span>IronCore Gym</span>. Bảo lưu mọi quyền.</span>
  </div>
</footer>

<script src="js/data.js"></script>
<script src="js/auth.js"></script>
<!-- Tích hợp thêm file cart.js -->
<script src="js/cart.js"></script>
<script>
  let currentCategory = "all";

  document.addEventListener("DOMContentLoaded", function() {
    renderAuthNav();
    initShopCategories();
    filterAndRenderShop();

    document.getElementById("shop-search").addEventListener("input", filterAndRenderShop);
    document.getElementById("shop-sort").addEventListener("change", filterAndRenderShop);
  });

  function initShopCategories() {
    const container = document.getElementById("shop-categories");
    const categories = getCategories();
    
    let html = `<button class="filter-btn active" data-id="all" style="width: 100%; text-align: left; border-radius: 6px;">Tất cả</button>`;
    html += categories.map(c => `
      <button class="filter-btn" data-id="${c.id}" style="width: 100%; text-align: left; border-radius: 6px;">${c.name}</button>
    `).join("");
    
    container.innerHTML = html;

    container.querySelectorAll(".filter-btn").forEach(btn => {
      btn.addEventListener("click", function() {
        container.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
        this.classList.add("active");
        currentCategory = this.dataset.id;
        filterAndRenderShop();
      });
    });
  }

  function filterAndRenderShop() {
    const keyword = document.getElementById("shop-search").value.trim().toLowerCase();
    const sortVal = document.getElementById("shop-sort").value;
    let products = getProducts();
    const categories = getCategories();

    if (currentCategory !== "all") {
      products = products.filter(p => p.categoryId === parseInt(currentCategory));
    }

    if (keyword) {
      products = products.filter(p => p.name.toLowerCase().includes(keyword) || p.description.toLowerCase().includes(keyword));
    }

    if (sortVal === "asc") products.sort((a, b) => a.price - b.price);
    if (sortVal === "desc") products.sort((a, b) => b.price - a.price);

    const grid = document.getElementById("shop-grid");
    if (products.length === 0) {
      grid.innerHTML = `<p class="no-data">Không tìm thấy sản phẩm nào phù hợp.</p>`;
      return;
    }

    grid.innerHTML = products.map(p => {
      const cat = categories.find(c => c.id === p.categoryId);
      return `
        <div class="product-card" onclick="window.location.href='product-detail.html?id=${p.id}'">
          <img src="${p.image}" alt="${p.name}" class="product-img" loading="lazy" onerror="this.src='https://via.placeholder.com/400x250'"/>
          <div class="product-body">
            <span class="product-cat">${cat ? cat.name : "Khác"}</span>
            <h3 class="product-name">${p.name}</h3>
            <p class="product-desc">${p.description}</p>
            <div class="product-price" style="margin-top: 0.5rem; margin-bottom: 0.5rem;">${formatPrice(p.price)}</div>
            <!-- CẬP NHẬT: Chia thành 2 nút Xem chi tiết và Thêm vào giỏ -->
            <div style="display: flex; gap: 0.5rem; margin-top: 1rem;">
              <button class="btn-detail" style="flex: 1; text-align: center; padding: 8px 0;">Chi tiết</button>
              <button class="btn-primary" style="flex: 1.2; font-size: 11px; padding: 8px 0; border-radius: var(--radius);" 
                      onclick="event.stopPropagation(); addToCart(${p.id})">
                🛒 Thêm giỏ
              </button>
            </div>
          </div>
        </div>
      `;
    }).join("");
  }
</script>
</body>
</html>
