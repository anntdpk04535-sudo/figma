<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Đăng ký – IronCore Gym</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

<nav class="navbar">
  <a href="index.html" class="nav-logo">IRON<span>CORE</span></a>
  <div id="nav-user"></div>
</nav>

<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">IRON<span>CORE</span></div>
    <h1 class="auth-title">Đăng ký tài khoản</h1>
    <p class="auth-sub">Tạo tài khoản để bắt đầu hành trình!</p>

    <form id="register-form">
      <div class="form-field">
        <label for="reg-name">Họ và tên</label>
        <input type="text" id="reg-name" placeholder="Nguyễn Văn A"/>
      </div>

      <div class="form-field">
        <label for="reg-email">Email</label>
        <input type="email" id="reg-email" placeholder="ban@example.com"/>
      </div>

      <div class="form-field">
        <label for="reg-password">Mật khẩu</label>
        <input type="password" id="reg-password" placeholder="Tối thiểu 6 ký tự"/>
      </div>

      <div class="form-field">
        <label for="reg-confirm">Xác nhận mật khẩu</label>
        <input type="password" id="reg-confirm" placeholder="Nhập lại mật khẩu"/>
      </div>

      <div id="reg-error" class="error-msg"></div>

      <button type="submit" class="btn-submit">Tạo tài khoản</button>
    </form>

    <div class="auth-footer">
      Đã có tài khoản? <a href="login.html">Đăng nhập</a>
    </div>
  </div>
</div>

<script src="js/data.js"></script>
<script src="js/auth.js"></script>
<script>
  document.getElementById('register-form').addEventListener('submit', handleRegister);
</script>
</body>
</html>
